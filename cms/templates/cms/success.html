<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pendaftaran Berhasil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 
    <style>
        body {
            background: linear-gradient(135deg, #0f9d58, #34a853);
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg border-0 rounded-4 text-center p-5" style="max-width: 400px;">

        <!-- ICON -->
        <div class="mb-3">
            <h1>✅</h1>
        </div>

        <!-- UCAPAN -->
        <h4 class="fw-bold">Pendaftaran Berhasil!</h4>

        <p class="text-muted">
            Terima kasih sudah mendaftar{% if event_name %} untuk <strong>{{ event_name }}</strong>{% endif %}.<br>
            Sampai jumpa di event!
        </p>

        <!-- BUTTON -->
        <a href="/" class="btn btn-success mt-3">
            Kembali ke Dashboard
        </a>

    </div>

</div>

</body>
</html>
