{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Culture Assistant — Pegadaian</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        :root {
            --green-dark:  #014f28;
            --green-mid:   #016632;
            --green-base:  #00A651;
            --green-light: #e6f5ed;
            --green-pale:  #f0faf4;
            --gold:        #c9a84c;
            --gold-light:  #f5edd6;
            --text-dark:   #111a13;
            --text-mid:    #3d5245;
            --text-muted:  #7a9585;
            --border:      #d4e6da;
            --surface:     #ffffff;
            --bg:          #f4f8f5;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,166,81,0.12) 0%, transparent 70%);
            top: -200px; left: -200px;
        }
        body::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
            bottom: -150px; right: -150px;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 440px;
            max-width: 100%;
            height: 92vh;
            max-height: 780px;
            background: var(--surface);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.6) inset,
                0 24px 64px rgba(1,78,40,0.14),
                0 4px 16px rgba(0,0,0,0.06);
        }

        /* HEADER */
        .header {
            padding: 22px 24px 18px;
            background: var(--green-dark);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            width: 240px; height: 240px;
            background: radial-gradient(circle, rgba(0,166,81,0.3) 0%, transparent 70%);
            top: -80px; right: -60px;
        }
        .header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            position: relative;
        }
        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(201,168,76,0.2);
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 20px;
            padding: 4px 10px;
            margin-bottom: 10px;
        }
        .brand-badge span {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--gold);
            text-transform: uppercase;
        }
        .brand-dot {
            width: 6px; height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            color: #fff;
            line-height: 1.25;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .header h1 em {
            font-style: italic;
            color: rgba(255,255,255,0.7);
        }
        .header-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 7px; height: 7px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 6px #4ade80;
            animation: pulse 2s ease-in-out infinite;
        }
        .header-meta p {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
            font-weight: 300;
        }
        .avatar-wrap {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--green-base), #00c462);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .avatar-wrap svg { width: 22px; height: 22px; fill: white; }

        /* PROGRESS BAR */
        .progress-bar {
            height: 2px;
            background: rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: -60%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,166,81,0.8), transparent);
            animation: shimmer 2.5s ease-in-out infinite;
        }
        @keyframes shimmer { to { left: 120%; } }

        /* CHAT BOX */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* DATE DIVIDER */
        .date-label {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.04em;
            position: relative;
        }
        .date-label::before, .date-label::after {
            content: '';
            position: absolute;
            top: 50%; width: 28%;
            height: 1px;
            background: var(--border);
        }
        .date-label::before { left: 0; }
        .date-label::after { right: 0; }

        /* MESSAGES */
        .msg-row {
            display: flex;
            gap: 10px;
            animation: slideUp 0.3s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg-row.user { flex-direction: row-reverse; }

        .bot-icon {
            width: 30px; height: 30px;
            background: var(--green-light);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .bot-icon svg { width: 16px; height: 16px; fill: var(--green-mid); }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 13.5px;
            line-height: 1.6;
            color: var(--text-dark);
        }
        .bubble.bot {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }
        .bubble.user {
            background: var(--green-base);
            color: white;
            border-bottom-right-radius: 6px;
        }

        /* STARS */
        .rating-wrap { margin-top: 12px; }
        .rating-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
        .stars { display: flex; gap: 6px; }
        .stars button {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-size: 26px;
            color: var(--border);
            transition: color 0.15s, transform 0.15s;
            line-height: 1;
        }
        .stars button:hover,
        .stars button.active { color: var(--gold); transform: scale(1.15); }
        .stars button:disabled {
            cursor: not-allowed;
            transform: none;
        }

        /* QUICK REPLIES */
        .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--green-pale);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            color: var(--green-mid);
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .chip:hover { background: var(--green-light); border-color: var(--green-base); }

        /* TYPING */
        .typing-row { display: flex; align-items: center; gap: 10px; }
        .typing-dots {
            display: flex; gap: 5px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 12px 16px;
        }
        .typing-dots span {
            width: 7px; height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        /* SENTIMENT TAG */
        .sentiment-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 10px;
            margin-top: 6px;
        }
        .sentiment-tag.positive { background: #dcfce7; color: #166534; }
        .sentiment-tag.neutral  { background: #f1f5f9; color: #475569; }
        .sentiment-tag.negative { background: #fee2e2; color: #991b1b; }

        /* AI BADGE */
        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 6px;
            background: var(--green-pale);
            color: var(--green-mid);
            border: 1px solid var(--border);
        }

        /* INPUT */
        .input-area {
            padding: 14px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 6px 8px 6px 18px;
            transition: border-color 0.2s;
        }
        .input-row:focus-within { border-color: var(--green-base); background: white; }
        .input-row input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: var(--text-dark);
            outline: none;
            padding: 6px 0;
        }
        .input-row input::placeholder { color: var(--text-muted); }
        .send-btn {
            width: 38px; height: 38px;
            border-radius: 14px;
            background: var(--green-base);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
        }
        .send-btn:hover { background: var(--green-mid); transform: scale(1.05); }
        .send-btn:active { transform: scale(0.96); }
        .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
        .send-btn svg { width: 17px; height: 17px; fill: white; }
        .input-hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 8px; }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--green-dark);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.4s cubic-bezier(.22,1,.36,1);
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

<div class="card">

    <!-- HEADER -->
    <div class="header">
        <div class="header-top">
            <div>
                <div class="brand-badge">
                    <div class="brand-dot"></div>
                    <span>Pegadaian</span>
                </div>
                <h1>Digital Culture<br><em>Assistant</em></h1>
                <div class="header-meta">
                    <div class="status-dot"></div>
                    <p>Online · Powered by AI</p>
                </div>
            </div>
            <div class="avatar-wrap">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
            </div>
        </div>
    </div>
    <div class="progress-bar"></div>

    <!-- CHAT BOX -->
    <div class="chat-box" id="chatBox">

        <div class="date-label">Hari ini</div>

        <div class="msg-row">
            <div class="bot-icon">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            </div>
            <div>
                <div class="bubble bot">
                    Halo! 👋 Saya Digi, asisten digital budaya Pegadaian.<br><br>
                    Ceritakan pengalaman, kesan, atau masukan Anda terkait <strong>budaya digital di Pegadaian</strong>.
                </div>
                <div class="quick-replies">
                    <button class="chip" onclick="fillInput('Pelayanan digitalnya sudah bagus')">👍 Sudah bagus</button>
                    <button class="chip" onclick="fillInput('Ada saran untuk event pelatihan')">📅 Saran event</button>
                    <button class="chip" onclick="fillInput('Perlu peningkatan di beberapa hal')">💬 Ada saran</button>
                </div>
            </div>
        </div>

    </div>

    <!-- INPUT -->
    <div class="input-area">
        <div class="input-row">
            <input
                type="text"
                id="userInput"
                placeholder="Tulis pesan Anda…"
                autocomplete="off"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Kirim">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
        <p class="input-hint">Pesan Anda terenkripsi dan aman 🔒</p>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>

    // =========================
    // GET EVENT ID
    // =========================
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get('event_id');

    // =========================
    // STATE
    // =========================
    let isWaiting = false;
    let ratingSubmitted = false;
    let currentFeedbackId = null;

    // =========================
    // QUICK REPLY
    // =========================
    function fillInput(text) {

        document.getElementById('userInput').value = text;

        document.getElementById('userInput').focus();
    }

    // =========================
    // TOAST
    // =========================
    function showToast(msg) {

        const t = document.getElementById('toast');

        t.textContent = msg;

        t.classList.add('show');

        setTimeout(() => {

            t.classList.remove('show');

        }, 3000);
    }

    // =========================
    // SEND MESSAGE
    // =========================
    function sendMessage() {

        if (isWaiting) return;

        const input   = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');

        const text = input.value.trim();

        if (!text) return;

        appendMsg('user', text);

        input.value = '';

        isWaiting = true;

        document.getElementById('sendBtn').disabled = true;

        const typingId = appendTyping();

        chatBox.scrollTop = chatBox.scrollHeight;

        fetch('/chat-ai/', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },

            body: JSON.stringify({
                message: text,
                event_id: eventId
            })
        })

        .then(r => r.json())

        .then(data => {

            removeTyping(typingId);

            isWaiting = false;

            document.getElementById('sendBtn').disabled = false;

            // =========================
            // ERROR
            // =========================
            if (data.status === 'error') {

                const err = appendBotBubble();

                err.innerHTML = data.message || 'Terjadi kesalahan';

                return;
            }

            // =========================
            // SAVE FEEDBACK ID
            // =========================
            currentFeedbackId = data.feedback_id;

            // =========================
            // BOT REPLY
            // =========================
            const botDiv = appendBotBubble();

            botDiv.innerHTML = data.reply || 'Maaf, terjadi kesalahan';

            const badge = document.createElement('div');

            badge.className = 'ai-badge';

            badge.textContent = '✦ Dijawab oleh AI';

            botDiv.appendChild(badge);

            // =========================
            // SENTIMENT
            // =========================
            if (data.sentiment) {

                const label = {
                    positive: '😊 Positif',
                    neutral: '😐 Netral',
                    negative: '😔 Negatif'
                }[data.sentiment] || '😐 Netral';

                const tag = document.createElement('div');

                tag.className = `sentiment-tag ${data.sentiment}`;

                tag.textContent =
                    `${label} (${data.confidence || 0}%)`;

                botDiv.appendChild(tag);
            }

            // =========================
            // SHOW RATING
            // =========================
            if (data.show_rating === true) {

                ratingSubmitted = false;

                const ratingDiv = appendBotBubble();

                ratingDiv.innerHTML = `

                    <div class="rating-wrap">

                        <p class="rating-label">
                            Beri rating untuk event ini
                        </p>

                        <div class="stars" id="stars">

                            <button type="button" onclick="setRating(1)">
                                ★
                            </button>

                            <button type="button" onclick="setRating(2)">
                                ★
                            </button>

                            <button type="button" onclick="setRating(3)">
                                ★
                            </button>

                            <button type="button" onclick="setRating(4)">
                                ★
                            </button>

                            <button type="button" onclick="setRating(5)">
                                ★
                            </button>

                        </div>

                    </div>
                `;
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        })

        .catch(() => {

            removeTyping(typingId);

            isWaiting = false;

            document.getElementById('sendBtn').disabled = false;

            const botDiv = appendBotBubble();

            botDiv.innerHTML =
                '⚠️ Gagal menghubungi AI';

            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    // =========================
    // SAVE RATING
    // =========================
    function setRating(value) {

        if (ratingSubmitted) return;

        if (!currentFeedbackId) {

            showToast('Feedback belum tersedia');

            return;
        }

        ratingSubmitted = true;

        const btns =
            document.querySelectorAll('#stars button');

        btns.forEach((b, i) => {

            b.classList.toggle('active', i < value);

            b.disabled = true;
        });

        console.log("EVENT ID:", eventId);
        
        fetch('/save-feedback/', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },

            body: JSON.stringify({

                feedback_id: currentFeedbackId,
                rating: value

            })
        })

        .then(r => r.json())

        .then(data => {

            if (data.status === 'error') {

                showToast(data.message);

                ratingSubmitted = false;

                btns.forEach(b => {

                    b.disabled = false;
                });

                return;
            }

            const chatBox =
                document.getElementById('chatBox');

            const msg = appendBotBubble();

            const stars =
                '★'.repeat(value) +
                '☆'.repeat(5 - value);

            msg.innerHTML = `
                Rating <strong>${stars}</strong>
                berhasil disimpan 🎉
                <br>
                Terima kasih atas feedback Anda.
            `;

            chatBox.scrollTop = chatBox.scrollHeight;

            showToast('✅ Rating berhasil disimpan');
        })

        .catch(() => {

            showToast('⚠️ Gagal menyimpan rating');

            ratingSubmitted = false;

            btns.forEach(b => {

                b.disabled = false;
            });
        });
    }

    // =========================
    // APPEND USER MESSAGE
    // =========================
    function appendMsg(type, text) {

        const chatBox =
            document.getElementById('chatBox');

        const row =
            document.createElement('div');

        row.className = `msg-row ${type}`;

        const bubble =
            document.createElement('div');

        bubble.className = `bubble ${type}`;

        bubble.textContent = text;

        row.appendChild(bubble);

        chatBox.appendChild(row);

        chatBox.scrollTop = chatBox.scrollHeight;

        return bubble;
    }

    // =========================
    // APPEND BOT BUBBLE
    // =========================
    function appendBotBubble() {

        const chatBox =
            document.getElementById('chatBox');

        const row =
            document.createElement('div');

        row.className = 'msg-row';

        const icon =
            document.createElement('div');

        icon.className = 'bot-icon';

        icon.innerHTML = `
            <svg viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
        `;

        const bubble =
            document.createElement('div');

        bubble.className = 'bubble bot';

        row.appendChild(icon);

        row.appendChild(bubble);

        chatBox.appendChild(row);

        chatBox.scrollTop = chatBox.scrollHeight;

        return bubble;
    }

    // =========================
    // TYPING
    // =========================
    function appendTyping() {

        const chatBox =
            document.getElementById('chatBox');

        const id = 'typing-' + Date.now();

        const row =
            document.createElement('div');

        row.className = 'typing-row';

        row.id = id;

        const icon =
            document.createElement('div');

        icon.className = 'bot-icon';

        icon.innerHTML = `
            <svg viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
        `;

        const dots =
            document.createElement('div');

        dots.className = 'typing-dots';

        dots.innerHTML = `
            <span></span>
            <span></span>
            <span></span>
        `;

        row.appendChild(icon);

        row.appendChild(dots);

        chatBox.appendChild(row);

        return id;
    }

    // =========================
    // REMOVE TYPING
    // =========================
    function removeTyping(id) {

        const el = document.getElementById(id);

        if (el) el.remove();
    }

    // =========================
    // ENTER KEY
    // =========================
    document.getElementById('userInput')
        .addEventListener('keypress', function(e) {

            if (e.key === 'Enter') {

                sendMessage();
            }
        });

</script>
</body>
</html>
