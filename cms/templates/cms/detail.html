<!DOCTYPE html>
<html>
<head>
    <title>Detail</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Poppins'; background: #F8F9FA; }
        .navbar { background: #016632; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand">Digital Culture</span>
    </div>
</nav>

<div class="container mt-4">

    <h1>Content Title</h1>

    <img src="https://via.placeholder.com/800x300" class="img-fluid rounded mb-3">

    <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
        This is the content body.
    </p>

    <h4> Reaction</h4>
    <button class="btn btn-success">Like</button>
    <button class="btn btn-warning">Rate </button>

    <h3 class="mt-5">You May Also Like</h3>

<div class="row">
    <div class="col-md-4">
        <div class="card p-3">
            <h6>Work Discipline</h6>
            <p class="text-muted">Improve daily habits</p>
            <a href="#" class="btn btn-outline-success btn-sm">Read</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3">
            <h6>Leadership Basics</h6>
            <p class="text-muted">Be a better leader</p>
            <a href="#" class="btn btn-outline-success btn-sm">Read</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3">
            <h6>Communication Skills</h6>
            <p class="text-muted">Improve communication</p>
            <a href="#" class="btn btn-outline-success btn-sm">Read</a>
        </div>
    </div>
</div>

<script>
let startTime = Date.now();
let lastSent = 0;

// function kirim data (anti spam)
function sendData(type, value=null) {
    let now = Date.now();
    if (now - lastSent < 2000) return; // max tiap 2 detik
    lastSent = now;

    fetch('/track/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            type: type,
            value: value,
            url: window.location.pathname
        })
    });
}

// Page visit
window.onload = function() {
    sendData("page_visit");
};

// Time spent
window.onbeforeunload = function() {
    let timeSpent = Date.now() - startTime;
    sendData("time_spent", timeSpent);
};

// Click tracking
document.addEventListener("click", function() {
    sendData("click");
});

// Scroll tracking (lebih aman)
let scrollTracked = false;
window.addEventListener("scroll", function() {
    let scrollPercent = (window.scrollY / document.body.scrollHeight) * 100;

    if (!scrollTracked && scrollPercent > 50) {
        sendData("scroll_50%");
        scrollTracked = true;
    }
});
</script>

</body>
</html>
