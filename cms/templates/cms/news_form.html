<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ action }}</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; background: linear-gradient(135deg, #e4effb 0%, #c9daf1 100%); color:#1e293b; font-family:'Poppins',sans-serif; min-height: 100vh; }
.container { width:90%; max-width:720px; margin:30px auto; }
.card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.85); border-radius:16px; box-shadow: 0 8px 32px rgba(30, 64, 175, 0.08); padding:28px; }

h1 { margin-bottom:14px; font-size:24px; }

label { display:block; margin-top:16px; font-size:14px; color:#334155; }

input, textarea, select {
    width:100%;
    padding:12px 14px;
    margin-top:8px;
    border:1px solid #cbd5f5;
    border-radius:12px;
    font-size:14px;
    background: rgba(255, 255, 255, 0.8);
    box-sizing: border-box;
}

input[type="file"] {
    padding: 10px 14px;
    cursor: pointer;
}

textarea { min-height:120px; resize:vertical; }

.button-row {
    margin-top:24px;
    display:flex;
    gap:14px;
}

button {
    border:none;
    border-radius:12px;
    padding:12px 18px;
    font-size:14px;
    cursor:pointer;
}

button.primary { background:#3b82f6; color:white; }
button.secondary { background:#f1f5f9; color:#1f2937; }

.nav { margin-bottom:18px; }
.nav a { text-decoration:none; color:#3b82f6; }

.image-preview {
    margin-top:10px;
    display:flex;
    align-items:center;
    gap:12px;
}

.image-preview img {
    width:auto;
    max-height:100px;
    border-radius:8px;
    border:1px solid #cbd5f5;
    object-fit:cover;
    padding:0;
    margin:0;
}

.image-preview small {
    color:#64748b;
    font-size:12px;
    line-height:1.5;
}
</style>
</head>

<body>
<div class="container">

    <div class="nav">
        <a href="{% url 'admin_explore' %}">← Kembali ke Explore Admin</a>
    </div>

    <div class="card">
        <h1>{{ action }}</h1>

        <form method="post"
              enctype="multipart/form-data"
              action="{% if news %}{% url form_action news.news_id %}{% else %}{% url form_action %}{% endif %}">

            {% csrf_token %}

            <label>Judul News</label>
            <input name="title"
                   value="{{ news.title|default_if_none:'' }}"
                   required>

            <label>Edition</label>
            <select name="edition">
                <option value="">-- Pilih Edition --</option>
                {% for ed in editions %}
                    <option value="{{ ed.edition_id }}"
                        {% if news.edition and news.edition.edition_id == ed.edition_id %}selected{% endif %}>
                        {{ ed.edition_name }}
                    </option>
                {% endfor %}
            </select>

            <label>Content / Description</label>
            <textarea name="content"
                      placeholder="Deskripsi news...">{{ news.content|default_if_none:'' }}</textarea>

            <label>Gambar</label>
            <input type="file" name="image_file" accept="image/*">

            {% if news.image_file %}
            <div class="image-preview">
                <img src="{{ news.image_file.url }}" alt="Gambar saat ini">
                <small>Gambar saat ini.<br>Upload file baru untuk mengganti.</small>
            </div>
            {% endif %}

            <div class="button-row">
                <button type="submit" class="primary">Simpan</button>
                <button type="button"
                        class="secondary"
                        onclick="window.location.href='{% url 'admin_explore' %}'">
                    Batal
                </button>
            </div>

        </form>
    </div>

</div>
</body>
</html>
